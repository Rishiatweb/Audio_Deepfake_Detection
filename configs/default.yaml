audio:
  sample_rate: 16000
  duration: 4
  num_samples: 64000  # sample_rate * duration

mel_configs:
  - name: fine
    n_fft: 400
    hop_length: 160
    n_mels: 64
  - name: mid
    n_fft: 1024
    hop_length: 256
    n_mels: 80
  - name: coarse
    n_fft: 2048
    hop_length: 512
    n_mels: 128

model:
  d_model: 128
  n_layers: 2
  n_heads: 4
  dropout: 0.15
  dann_hidden: 128

dann:
  enabled: true
  lambda_max: 0.3
  warmup_epochs: 4

diffusion:
  enabled: false
  steps: 200
  beta_min: 0.0001
  beta_max: 0.02
  lambda_diff: 0.0
  warmup_epochs: 6

domain_generalization:
  mixstyle_p: 0.5
  mixstyle_alpha: 0.6

training:
  batch_size: 32
  learning_rate: 0.0003
  epochs: 20
  patience: 8
  num_workers: 4
  max_train_samples: 20000
  max_val_samples: 5000
  max_train_steps: 400
  max_val_steps: 120
  seed: 42
  use_balanced_sampler: true
  use_focal_loss: true
  focal_gamma: 1.5
  focal_alpha: 0.60
  lambda_c: 0.1
  label_smooth: 0.03
  use_tta: true
  tta_shifts: [0, 2000, -2000]  # SR//8

paths:
  output_dir: results
  checkpoint_dir: results/checkpoints
  figures_dir: results/figures
  tables_dir: results/tables
  logs_dir: results/logs

  # Dataset roots — override via env vars or CLI args
  for_base: C:\Users\scima\Deepfake\condetection-dann\data\for-dataset
  itw_root: C:\Users\scima\Deepfake\condetection-dann\data\in-the-wild

cross_validation:
  n_folds: 5
  cv_epochs: 10
  cv_max_train_steps: null
